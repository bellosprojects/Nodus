<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="assets/NodusLogo.png" type="image/x-icon">
    <title>Nodus</title>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
</head>
<body>

    <header>
        <p class="app_name">Nodus</p>

        <div class="links">
            <div class="user-presence-container" id="user-presence"></div>
            <div class="divider"></div>
            <button id="export">Export</button>
            <button id="share">Share</button>
        </div>
    </header>

    <div class="app-container">

        
        <aside class="sidebar">
            
            <nav class="nav">
                <span>CREATE</span>
                <span class="selected">EDIT</span>
                <span>COLLAB</span>
            </nav>

            <section class="properties">
                <p>PROPERTIES</p>

                <span>
                    <p>Selection</p>
                    <p id="node-id">NONE</p>
                </span>

                <span class="size">
                    <div>
                        <p>WIDTH</p>
                        <span class="input-number">
                            <input type="number" id="node-width" disabled min="0" onkeydown="return event.key !== '-'">
                            <p>dt</p>
                        </span>
                    </div>
                    <div>
                        <p>HEIGHT</p>
                        <span class="input-number">
                            <input type="number" id="node-height" disabled min="0" onkeydown="return event.key !== '-'">
                            <p>dt</p>
                        </span>
                    </div>
                </span>

                <span class="position">
                    <div>
                        <p>X</p>
                        <span class="input-number">
                            <input type="number" id="node-x" disabled min="0" onkeydown="return event.key !== '-'">
                            <p>dt</p>
                        </span>
                    </div>
                    <div>
                        <p>Y</p>
                        <span class="input-number">
                            <input type="number" id="node-y" disabled min="0" onkeydown="return event.key !== '-'">
                            <p>dt</p>
                        </span>
                    </div>
                </span>

                <div class="fill">
                    <p>FILL</p>
                    <input type="color" disabled id="node-fill">
                </div>
            </section>

            <button class="tool-btn" id="add-rect-btn">
                <div class="rect-icon"></div>
                Cuadrado
            </button>

            <div class="trash-zone" id="trash-container">
                🗑️ TRASH
            </div>
        </aside>

        <div id="canvas-container"></div>

    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
